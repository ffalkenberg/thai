<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google Translate's TTS endpoint 404s when a Referer is present; send none so hosted behaves like a local file -->
<meta name="referrer" content="no-referrer">
<title>Thai Listening Practice — My deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>
<div class="wrap">
  <header>
    <nav class="nav"></nav>
    <div class="eyebrow">My deck</div>
    <h1>Your own <span class="th">คำศัพท์</span></h1>
    <p>The deck you built on the Data page. Edit it there (import/paste JSON), and it plays here with all the usual controls — tap to listen, slow the dial down, spacebar to pause, star to save.</p>
    <div class="rule"></div>
  </header>

  <div class="controls">
    <div class="controls-inner">
      <div class="speed">
        <label for="rate">Speed</label>
        <input type="range" id="rate" min="0.1" max="1" step="0.05" value="0.5">
        <div class="readout" id="readout">0.50×</div>
      </div>
      <div class="voice-pick" id="voiceWrap" hidden>
        <label for="voice">Voice</label>
        <select id="voice"></select>
      </div>
      <div class="reveal-toggle" id="maskToggle" role="switch" aria-checked="false" tabindex="0">
        <span class="switch"></span>
        <span>Listening mode</span>
      </div>
    </div>
  </div>

  <div class="list" id="list"></div>

  <footer>your imported deck · edit it on the Data page · space to pause</footer>
</div>

<script>
// Load the user's custom deck (saved by the Data page). Accepts objects or arrays.
let deck = [];
try { deck = JSON.parse(localStorage.getItem("thai-practice-deck") || "[]"); } catch(e){}
const SENTENCES = (Array.isArray(deck) ? deck : [])
  .map(x => Array.isArray(x) ? [x[0], x[1] || "", x[2] || ""] : [ (x&&(x.th||x.thai)) || "", (x&&(x.rom||x.romanization)) || "", (x&&(x.en||x.english)) || "" ])
  .filter(s => s[0]);
const EMPTY_MSG = "Your deck is empty. Open the Data page to paste or import JSON, save it, then come back.";
</script>
<script src="app.js?v=3"></script>
</body>
</html>
