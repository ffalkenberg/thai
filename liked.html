<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google Translate's TTS endpoint 404s when a Referer is present; send none so hosted behaves like a local file -->
<meta name="referrer" content="no-referrer">
<title>Thai Listening Practice — Saved</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=29">
</head>
<body>
<div class="wrap">
  <header>
    <nav class="nav"></nav>
    <div class="eyebrow">Saved</div>
    <h1>Your starred <span class="th">คำ</span></h1>
    <p>Every line you've starred across all sets, gathered in one place. Tap the ☆ on a card to remove it (it disappears on your next visit). Same controls: tap to listen, slow the dial down, spacebar to pause.</p>
    <div class="rule"></div>
  </header>

  <div class="controls">
    <div class="controls-inner">
      <div class="speed">
        <label for="rate">Speed</label>
        <input type="range" id="rate" min="0.1" max="1" step="0.05" value="0.5">
        <div class="readout" id="readout">0.50×</div>
      </div>
      <div class="voice-pick" id="voiceWrap" hidden>
        <label for="voice">Voice</label>
        <select id="voice"></select>
      </div>
      <div class="reveal-toggle" id="maskToggle" role="switch" aria-checked="false" tabindex="0">
        <span class="switch"></span>
        <span>Listening mode</span>
      </div>
    </div>
  </div>

  <div class="list" id="list"></div>

  <footer>your starred lines · space to pause</footer>
</div>

<script src="data.js?v=29"></script>
<script>
// Gather starred lines from the manifest, newest star first (star value is a timestamp).
const _m = (typeof loadManifest === "function") ? loadManifest() : [];
const _byTh = {};
for(const set of _m){ for(const l of (set.lines || [])){
  if(l && l.star && l.th){
    const ts = (typeof l.star === "number") ? l.star : 0;
    if(!_byTh[l.th] || ts > _byTh[l.th].ts) _byTh[l.th] = { th: l.th, rom: l.rom || "", en: l.en || "", ts };
  }
}}
const SENTENCES = Object.values(_byTh).sort((a, b) => b.ts - a.ts).map(r => [r.th, r.rom, r.en]);
const EMPTY_MSG = "No saved lines yet — tap the ☆ on any card to save it here.";
</script>
<script src="app.js?v=29"></script>
</body>
</html>
